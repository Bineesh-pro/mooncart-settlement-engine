spring:
  application:
    name: mooncartsettlement
  datasource:
    url: jdbc:postgresql://localhost:5462/mooncartsettlement
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

settlement:
  matching:
    amount-tolerance-pct: 0.05
    amount-discrepancy-threshold-pct: 0.02
    amount-absolute-tolerance:
      USD: 0.01
      PHP: 0.01
      IDR: 100
    settlement-delay-max-days: 5
    timing-anomaly-threshold-days: 3
    fuzzy-match-min-score: 70
    max-candidates-per-record: 20
    orphan-link-max-hours: 24

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
