spring:
  application:
    name: mooncartsettlement-test
  datasource:
    url: jdbc:h2:mem:mooncartsettlement;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

settlement:
  matching:
    amount-tolerance-pct: 0.05
    amount-discrepancy-threshold-pct: 0.02
    amount-absolute-tolerance:
      USD: 0.01
      PHP: 0.01
      IDR: 100
    settlement-delay-max-days: 5
    timing-anomaly-threshold-days: 3
    fuzzy-match-min-score: 70
    max-candidates-per-record: 20
    orphan-link-max-hours: 24
